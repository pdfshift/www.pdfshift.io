# Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "dist"
  command = "nuxt generate"

# Markdown negotiation edge function
# Use markdown-negotiation-simple for pre-generated markdown only (more reliable)
# Use markdown-negotiation for full HTML conversion (requires external deps)
[[edge_functions]]
function = "markdown-negotiation"
path = "/*"
